name: Build CV PDF

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Compile LaTeX PDF
        uses: xu-cheng/latex-action@v3
        with:
          root_file: Jacopo_cv.tex
          latexmk_use_xelatex: true

      - name: Upload PDF artifact
        uses: actions/upload-artifact@v4
        with:
          name: Jacopo_CV
          path: Jacopo_cv.pdf
          retention-days: 30
